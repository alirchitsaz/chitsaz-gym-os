<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chitsaz Gym OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#0a0e1a;color:#fff;min-height:100vh;padding:20px;padding-bottom:100px}
.container{max-width:480px;margin:0 auto}
header{text-align:center;padding:20px 0 30px}
.logo{font-size:12px;letter-spacing:3px;color:#0A84FF;font-weight:800;margin-bottom:8px}
h1{font-size:32px;font-weight:800;letter-spacing:-1px}
.subtitle{color:#8c94a7;margin-top:8px;font-size:15px}
.profiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px}
.profile{background:#151b2b;border:2px solid transparent;border-radius:18px;padding:20px;cursor:pointer;text-align:center;transition:.2s}
.profile.active{border-color:currentColor;background:#1a2138}
.profile .emoji{font-size:32px;margin-bottom:8px}
.profile .name{font-weight:800;font-size:16px}
.profile .desc{font-size:11px;color:#8c94a7;margin-top:2px}
.ali{color:#0A84FF}
.kristen{color:#BF5AF2}
.kam{color:#FF9F0A}
.ashton{color:#32D74B}
.section-label{font-size:11px;letter-spacing:2px;color:#8c94a7;font-weight:800;margin:20px 0 12px;text-transform:uppercase}
.workout-card{background:#151b2b;border:1px solid #232b3f;border-radius:16px;padding:18px;margin-bottom:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.workout-card:active{background:#1a2138}
.workout-card h3{font-size:16px;font-weight:800;margin-bottom:4px}
.workout-card .meta{font-size:13px;color:#8c94a7}
.chev{color:#0A84FF;font-size:22px}
.hidden{display:none}
.back{background:transparent;border:none;color:#0A84FF;font-size:16px;font-weight:600;margin-bottom:16px;cursor:pointer;padding:8px 0}
.setup-title{font-size:26px;font-weight:800;margin-bottom:6px}
.setup-sub{color:#8c94a7;font-size:14px;margin-bottom:20px}
.gym-view{background:linear-gradient(180deg,#0f1524,#0a0e1a);border:1px solid #232b3f;border-radius:20px;padding:20px;margin-bottom:20px}
svg{width:100%;height:auto;display:block}
.steps{background:#151b2b;border:1px solid #232b3f;border-radius:16px;padding:20px;margin-bottom:20px}
.step{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #232b3f}
.step:last-child{border-bottom:none}
.step-num{background:#0A84FF;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.step-text{font-size:14px;line-height:1.4;padding-top:3px}
.step-text b{color:#0A84FF}
.primary{width:100%;background:#0A84FF;color:#fff;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:10px}
.exercise-list{margin-top:20px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:#8c94a7;justify-content:center}
.legend div{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="container">

<header>
<div class="logo">CHITSAZ GYM OS</div>
<h1 id="title">Family Fitness</h1>
<div class="subtitle" id="sub">Choose your profile</div>
</header>

<div id="home">
<div class="profiles">
<div class="profile ali" onclick="pick('ali')"><div class="emoji">💪</div><div class="name">Ali</div><div class="desc">Strength · Recomp</div></div>
<div class="profile kristen" onclick="pick('kristen')"><div class="emoji">🌸</div><div class="name">Kristen</div><div class="desc">Pilates+ Strength</div></div>
<div class="profile kam" onclick="pick('kam')"><div class="emoji">⚡</div><div class="name">Kam · 13</div><div class="desc">Athletic Dev</div></div>
<div class="profile ashton" onclick="pick('ashton')"><div class="emoji">🏃</div><div class="name">Ashton · 8</div><div class="desc">Movement Play</div></div>
</div>

<div id="exList" class="hidden">
<div class="section-label">Today's Workout · Full Body</div>
<div id="workouts"></div>
</div>
</div>

<div id="setup" class="hidden">
<button class="back" onclick="goHome()">‹ Back</button>
<div class="setup-title" id="setupName"></div>
<div class="setup-sub" id="setupTarget"></div>

<div class="gym-view">
<svg id="gymSvg" viewBox="0 0 400 560"></svg>
<div class="legend">
<div><span class="dot" style="background:#374151"></span>Machine</div>
<div><span class="dot" style="background:#06B6D4"></span>Arms</div>
<div><span class="dot" style="background:#0A84FF"></span>Bench</div>
<div><span class="dot" style="background:#22C55E"></span>You</div>
<div><span class="dot" style="background:#FFD60A"></span>Attach</div>
</div>
</div>

<div class="steps" id="stepList"></div>
<button class="primary" onclick="goHome()">Got It · Start Set</button>
</div>

</div>

<script>
const EX = {
  flat_press:{
    name:"Flat Cable Bench Press",target:"Chest · Triceps",
    steps:["Attach <b>D-Handles</b> to both arms","Set both tracks to position <b>8 (Low)</b>","Set arms to angle <b>5 (Mid)</b>","Place bench <b>36\" from machine</b>, head pointing toward pulleys","Lie flat, press up and slightly together"],
    view:{arms:"low",bench:"press",athlete:"bench_press",attach:"handle"}
  },
  lat_pull:{
    name:"Cable Lat Pulldown",target:"Lats · Back",
    steps:["Attach <b>Straight Bar or Rope</b> to a single arm","Set track to position <b>1 (Highest)</b>","Center arm to position <b>5</b>","Kneel or sit <b>directly under</b> the pulley","Pull elbows down to ribs"],
    view:{arms:"high",bench:"none",athlete:"kneel",attach:"bar"}
  },
  seated_row:{
    name:"Seated Cable Row",target:"Back · Biceps",
    steps:["Attach <b>V-Bar</b> to a single arm","Set track to position <b>7 (Low-Mid)</b>","Bring arm to position <b>3 (Narrow)</b>","Sit on <b>floor</b>, feet braced on machine base","Pull to belly button"],
    view:{arms:"midlow",bench:"none",athlete:"floor",attach:"vbar"}
  },
  goblet_squat:{
    name:"Cable Goblet Squat",target:"Quads · Glutes",
    steps:["Attach <b>Short Straight Bar</b> to a single arm","Set track to position <b>8 (Low)</b>","Set arm to position <b>3 (Narrow)</b>","Stand <b>facing machine</b>, bar at collarbone","Squat down and drive up through heels"],
    view:{arms:"low",bench:"none",athlete:"face",attach:"bar"}
  },
  rdl:{
    name:"Cable Romanian Deadlift",target:"Hamstrings · Glutes",
    steps:["Attach <b>Straight Bar</b> to a single arm","Set track to position <b>8 (Low)</b>","Set arm to position <b>3 (Narrow)</b>","Stand <b>facing machine</b>, bar at waist","Hinge hips back, squeeze glutes up"],
    view:{arms:"low",bench:"none",athlete:"face",attach:"bar"}
  },
  face_pull:{
    name:"Cable Face Pull",target:"Rear Delts · Posture",
    steps:["Attach <b>Tricep Rope</b>","Set track to position <b>2 (High)</b>","Center arm at position <b>5</b>","Stand tall, thumbs pointing back","Pull to ears, elbows wide"],
    view:{arms:"high",bench:"none",athlete:"stand",attach:"rope"}
  }
};

const PLANS = {
  ali:["flat_press","seated_row","goblet_squat","face_pull"],
  kristen:["lat_pull","rdl","face_pull"],
  kam:["goblet_squat","flat_press","seated_row"],
  ashton:["goblet_squat","flat_press"]
};

let currentUser = null;

function pick(u){
  currentUser = u;
  document.querySelectorAll(".profile").forEach(p=>p.classList.remove("active"));
  document.querySelector(".profile."+u).classList.add("active");
  document.getElementById("title").textContent = "Hi, "+u.charAt(0).toUpperCase()+u.slice(1);
  document.getElementById("sub").textContent = "Tap a workout to see visual setup";
  renderWorkouts();
}

function renderWorkouts(){
  const list = document.getElementById("workouts");
  list.innerHTML = "";
  PLANS[currentUser].forEach(id=>{
    const ex = EX[id];
    const card = document.createElement("div");
    card.className = "workout-card";
    card.onclick = ()=>showSetup(id);
    card.innerHTML = '<div><h3>'+ex.name+'</h3><div class="meta">'+ex.target+'</div></div><div class="chev">›</div>';
    list.appendChild(card);
  });
  document.getElementById("exList").classList.remove("hidden");
}

function showSetup(id){
  const ex = EX[id];
  document.getElementById("setupName").textContent = ex.name;
  document.getElementById("setupTarget").textContent = ex.target;

  const stepList = document.getElementById("stepList");
  stepList.innerHTML = "";
  ex.steps.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "step";
    div.innerHTML = '<div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div>';
    stepList.appendChild(div);
  });

  drawGym(ex.view);
  document.getElementById("home").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");
  window.scrollTo(0,0);
}

function drawGym(v){
  const svg = document.getElementById("gymSvg");

  let armY1, armY2;
  if(v.arms==="high"){armY1=60;armY2=170}
  else if(v.arms==="low"){armY1=180;armY2=290}
  else if(v.arms==="midlow"){armY1=140;armY2=230}
  else {armY1=120;armY2=220}

  let bench = "";
  if(v.bench==="press"){
    // Vertical bench, head toward machine at top
    bench = '<rect x="180" y="285" width="40" height="180" fill="#0A84FF" rx="6"/>' +
            '<line x1="180" y1="330" x2="220" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>' +
            '<text x="200" y="308" fill="white" font-size="10" text-anchor="middle" font-weight="800">HEAD</text>' +
            '<text x="200" y="455" fill="white" font-size="10" text-anchor="middle" font-weight="800">FEET</text>' +
            '<line x1="200" y1="240" x2="200" y2="285" stroke="#FFD60A" stroke-dasharray="4 4"/>' +
            '<text x="212" y="268" fill="#FFD60A" font-size="12" font-weight="700">36"</text>';
  }

  let athlete = "";
  if(v.athlete==="bench_press") {
    athlete = '<circle cx="200" cy="315" r="11" fill="#22C55E"/>' +
              '<text x="200" y="500" fill="#22C55E" font-size="11" text-anchor="middle" font-weight="800">LIE FLAT · HEAD TOWARD MACHINE</text>';
  }
  else if(v.athlete==="kneel") athlete = '<circle cx="200" cy="300" r="16" fill="#22C55E"/><text x="200" y="340" fill="#22C55E" font-size="12" text-anchor="middle" font-weight="700">KNEEL HERE</text>';
  else if(v.athlete==="floor") athlete = '<rect x="180" y="340" width="40" height="20" fill="#22C55E" rx="4"/><text x="200" y="385" fill="#22C55E" font-size="12" text-anchor="middle" font-weight="700">SIT ON FLOOR</text>';
  else if(v.athlete==="face") athlete = '<circle cx="200" cy="330" r="16" fill="#22C55E"/><text x="200" y="370" fill="#22C55E" font-size="12" text-anchor="middle" font-weight="700">STAND HERE</text>';
  else athlete = '<circle cx="200" cy="380" r="16" fill="#22C55E"/><text x="200" y="420" fill="#22C55E" font-size="12" text-anchor="middle" font-weight="700">STAND HERE</text>';

  let attachIcon = "";
  if(v.attach==="handle"){
    attachIcon = '<circle cx="80" cy="'+armY2+'" r="8" fill="#FFD60A"/>' +
                 '<circle cx="320" cy="'+armY2+'" r="8" fill="#FFD60A"/>';
  } else if(v.attach==="rope"){
    attachIcon = '<rect x="195" y="'+armY2+'" width="10" height="30" fill="#FFD60A"/>';
  } else if(v.attach==="vbar"){
    attachIcon = '<polygon points="185,'+armY2+' 215,'+armY2+' 200,'+(armY2+20)+'" fill="#FFD60A"/>';
  } else {
    attachIcon = '<rect x="170" y="'+(armY2-3)+'" width="60" height="8" fill="#FFD60A" rx="2"/>';
  }

  svg.innerHTML =
    '<rect x="0" y="0" width="400" height="560" fill="#0a0e1a"/>' +
    '<rect x="20" y="20" width="360" height="520" fill="none" stroke="#232b3f" stroke-dasharray="6 6" rx="12"/>' +
    '<text x="30" y="40" fill="#8c94a7" font-size="10" font-weight="700">TOP-DOWN GYM VIEW</text>' +
    '<rect x="140" y="40" width="120" height="200" fill="#374151" stroke="#4b5563" stroke-width="2" rx="8"/>' +
    '<text x="200" y="150" fill="#8c94a7" font-size="11" text-anchor="middle" font-weight="700">MACHINE</text>' +
    '<line x1="150" y1="'+armY1+'" x2="80" y2="'+armY2+'" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>' +
    '<line x1="250" y1="'+armY1+'" x2="320" y2="'+armY2+'" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>' +
    attachIcon +
    bench +
    athlete +
    '<text x="200" y="530" fill="#8c94a7" font-size="10" text-anchor="middle">Machine at top · You face this direction</text>';
}

function goHome(){
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
  window.scrollTo(0,0);
}
</script>

</body>
</html>
