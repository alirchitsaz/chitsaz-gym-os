<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chitsaz Gym OS</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

button{
    background:#0A84FF;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
}

.hidden{
    display:none;
}

svg{
    width:100%;
    max-width:400px;
}
</style>
</head>
<body>

<h1>Chitsaz Gym OS</h1>

<div id="home">
    <div class="card">
        <h2>Flat Cable Bench Press</h2>

        <button onclick="showSetup()">
            Visual Setup
        </button>
    </div>
</div>

<div id="setup" class="hidden">

    <div class="card">

        <h2>Visual Setup</h2>

        <svg viewBox="0 0 400 600">

            <rect
                x="125"
                y="40"
                width="150"
                height="120"
                fill="#374151"
                rx="12"/>

            <line
                x1="150"
                y1="120"
                x2="80"
                y2="240"
                stroke="#06B6D4"
                stroke-width="8"/>

            <line
                x1="250"
                y1="120"
                x2="320"
                y2="240"
                stroke="#06B6D4"
                stroke-width="8"/>

            <rect
                x="120"
                y="320"
                width="160"
                height="40"
                fill="#0A84FF"
                rx="8"/>

            <circle
                cx="200"
                cy="450"
                r="20"
                fill="#22C55E"/>

        </svg>

        <p>1. Move both arms outward.</p>
        <p>2. Place bench in blue location.</p>
        <p>3. Head toward machine.</p>
        <p>4. Attach D-handles.</p>

        <br>

        <button onclick="goHome()">
            Back
        </button>

    </div>

</div>

<script>
function showSetup(){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
}

function goHome(){
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
}
</script>

</body>
</html>
